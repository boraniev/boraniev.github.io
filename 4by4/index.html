<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interval Trainer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Interval Trainer</h1>

    <section id="config">
      <label for="runMinutes">Run duration (minutes): <span id="runMinutesLabel">2</span></label>
      <select id="runMinutes" aria-describedby="runMinutesLabel">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
      <div class="controls">
        <button id="startBtn">Start</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="stopBtn" disabled>Stop</button>
      </div>
    </section>

    <section id="status" aria-live="polite">
      <div class="phase">Phase: <strong id="phaseName">Idle</strong></div>
      <div class="time">Time left: <strong id="timeLeft">00:00</strong></div>
      <div class="progress-wrap" aria-hidden="true">
        <div id="progressBar" class="progress"></div>
      </div>
      <div id="transcript" class="transcript" aria-live="polite"></div>
    </section>

    <section id="options">
      <label><input id="voiceToggle" type="checkbox" checked /> Enable voice guidance</label>
    </section>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
